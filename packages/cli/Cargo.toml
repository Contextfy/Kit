[package]
name = "contextfy-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "contextfy"
path = "src/main.rs"

[dependencies]
contextfy-core = { path = "../core" }
clap = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
colored = "2.1"

[dev-dependencies]
tempfile = "3.10"
